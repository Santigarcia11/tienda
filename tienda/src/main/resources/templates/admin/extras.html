<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Extras - Angels & Demons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        body {
            background: #f8f9fa;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            width: 250px;
            padding: 20px;
            color: white;
        }
        .sidebar h3 {
            margin-bottom: 30px;
            font-weight: bold;
            text-align: center;
        }
        .sidebar a, .sidebar button {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: none;
            border-radius: 8px;
            text-decoration: none;
            text-align: left;
            transition: all 0.3s;
        }
        .sidebar a:hover, .sidebar button:hover {
            background: rgba(255, 255, 255, 0.2);
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .form-container {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            margin-bottom: 30px;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1px solid #ddd;
        }
        .form-control:focus, .form-select:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-submit {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            font-weight: bold;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #5568d3 0%, #653a8b 100%);
            color: white;
        }
        .extras-table {
            background: white;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            overflow: hidden;
        }
        .table {
            margin-bottom: 0;
        }
        .table thead {
            background: #f8f9fa;
        }
        .table th {
            border: none;
            font-weight: 600;
            color: #333;
        }
        .table td {
            border: none;
            vertical-align: middle;
            padding: 15px;
        }
        .table tbody tr {
            border-bottom: 1px solid #e9ecef;
        }
        .table tbody tr:last-child {
            border-bottom: none;
        }
        .price-badge {
            background: #e8f4f8;
            color: #667eea;
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: bold;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        @media (max-width: 768px) {
            .sidebar {
                width: 100%;
                height: auto;
                position: relative;
                padding: 10px;
            }
            .sidebar a, .sidebar button {
                display: inline-block;
                width: auto;
                margin-right: 10px;
            }
            .main-content {
                margin-left: 0;
                padding: 15px;
            }
            .form-container {
                padding: 15px;
            }
            .table {
                font-size: 14px;
            }
            .table td {
                padding: 10px;
            }
        }
    </style>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
    <h3>🔐 Admin</h3>
    <a href="/admin/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
    <a href="/admin/productos"><i class="bi bi-boxes"></i> Productos</a>
    <a href="/admin/extras"><i class="bi bi-plus-circle"></i> Extras</a>
    <a href="/pedido/listado"><i class="bi bi-receipt"></i> Pedidos</a>
</div>

<!-- MAIN CONTENT -->
<div class="main-content">
    <h1 class="mb-4">➕ Gestionar Extras/Toppings</h1>

    <!-- FORMULARIO AGREGAR EXTRA -->
    <div class="form-container">
        <h5 class="mb-3">Agregar Nuevo Extra</h5>
        <form method="post" th:action="@{/admin/extras}">
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label">Nombre *</label>
                        <input type="text" class="form-control" name="nombre" 
                               placeholder="Ej: Jeringada Extra, Topping Chocolate" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label">Descripción *</label>
                        <input type="text" class="form-control" name="descripcion" 
                               placeholder="Ej: Extra de jarabe de chocolate" required>
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label class="form-label">Precio ($) *</label>
                        <div class="input-group">
                            <span class="input-group-text">$</span>
                            <input type="number" class="form-control" name="precio" step="0.01" 
                                   placeholder="1.50" required>
                        </div>
                    </div>
                </div>
            </div>
            <button type="submit" class="btn btn-submit">
                <i class="bi bi-plus-circle"></i> Agregar Extra
            </button>
        </form>
    </div>

    <!-- TABLA DE EXTRAS -->
    <div th:if="${#lists.isEmpty(extras)}" class="empty-state">
        <h3>📭 No hay extras</h3>
        <p>Crea opciones de extras como jeringas, toppings o complementos</p>
    </div>

    <div th:if="${!#lists.isEmpty(extras)}" class="extras-table">
        <table class="table">
            <thead>
                <tr>
                    <th width="40%">Nombre</th>
                    <th width="30%">Descripción</th>
                    <th width="15%">Precio</th>
                    <th width="15%">Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="extra : ${extras}">
                    <td>
                        <strong th:text="${extra.nombre}"></strong>
                    </td>
                    <td th:text="${extra.descripcion}"></td>
                    <td>
                        <span class="price-badge" th:text="'$' + ${#numbers.formatDecimal(extra.precio, 0, 'DEFAULT', 0, 'DEFAULT')}"></span>
                    </td>
                    <td>
                        <a th:href="@{/admin/extras/{id}/eliminar(id=${extra.id})}" 
                           class="btn btn-sm btn-danger"
                           onclick="return confirm('¿Eliminar este extra?')">
                            <i class="bi bi-trash"></i> Eliminar
                        </a>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
