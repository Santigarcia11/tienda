<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Carrito</title>
    <link rel="stylesheet" th:href="@{/css/styles.css}">
    <style>
        .carrito-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
        }
        .carrito-vacio {
            text-align: center;
            padding: 40px;
            background: #f5f5f5;
            border-radius: 8px;
        }
        .tabla-carrito {
            width: 100%;
            border-collapse: collapse;
            margin: 20px 0;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .tabla-carrito th, .tabla-carrito td {
            padding: 15px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }
        .tabla-carrito th {
            background: #333;
            color: white;
            font-weight: bold;
        }
        .tabla-carrito tr:last-child td {
            border-bottom: none;
        }
        .tabla-carrito tr:hover {
            background: #f9f9f9;
        }
        .btn-eliminar {
            background: #ff5757;
            color: white;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }
        .btn-eliminar:hover {
            background: #d63f3f;
        }
        .resumen-carrito {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 8px;
            max-width: 500px;
            margin-left: auto;
        }
        .resumen-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid #ddd;
        }
        .resumen-total {
            display: flex;
            justify-content: space-between;
            padding: 15px 0;
            font-size: 20px;
            font-weight: bold;
            color: #333;
        }
        .formulario-cliente {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }
        .formulario-cliente h3 {
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #333;
            box-shadow: 0 0 4px rgba(0,0,0,0.2);
        }
        .botones {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-continuar {
            flex: 1;
            padding: 12px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-continuar:hover {
            background: #218838;
        }
        .btn-volver {
            padding: 12px 20px;
            background: #999;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
        }
        .btn-volver:hover {
            background: #777;
        }
    </style>
</head>

<body>

<div class="carrito-container">
    <h1>🛒 Tu Carrito</h1>

    <div th:if="${#lists.isEmpty(carrito)}" class="carrito-vacio">
        <h2>Tu carrito está vacío 😢</h2>
        <p>Agrega algunos productos deliciosos</p>
        <a href="/" class="btn-volver">← Volver a comprar</a>
    </div>

    <div th:if="${!#lists.isEmpty(carrito)}">
        <!-- TABLA DE PRODUCTOS -->
        <table class="tabla-carrito">
            <thead>
                <tr>
                    <th>Producto</th>
                    <th>Precio Unitario</th>
                    <th>Cantidad</th>
                    <th>Subtotal</th>
                    <th>Acción</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="item : ${carrito}">
                    <td th:text="${item.nombre}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(item.precio, 0, 'DEFAULT', 0, 'DEFAULT')}"></td>
                    <td th:text="${item.cantidad}"></td>
                    <td th:text="'$' + ${#numbers.formatDecimal(item.subtotal, 0, 'DEFAULT', 0, 'DEFAULT')}"></td>
                    <td>
                        <a href="/carrito/vaciar" class="btn-eliminar" onclick="return confirm('¿Vaciar carrito?')">Vaciar</a>
                    </td>
                </tr>
            </tbody>
        </table>

        <!-- RESUMEN -->
        <div class="resumen-carrito">
            <div class="resumen-item">
                <span>Subtotal:</span>
                <span th:text="'$' + ${#numbers.formatDecimal(totalCarrito, 0, 'DEFAULT', 0, 'DEFAULT')}"></span>
            </div>
            <div class="resumen-total">
                <span>Total:</span>
                <span th:text="'$' + ${#numbers.formatDecimal(totalCarrito, 0, 'DEFAULT', 0, 'DEFAULT')}"></span>
            </div>
        </div>

        <!-- FORMULARIO PARA INGRESAR DATOS -->
        <form th:action="@{/pedido/checkout}" method="post">
            <div class="formulario-cliente">
                <h3>📋 Datos de Entrega</h3>

                <div class="form-group">
                    <label for="cliente">Nombre Completo *</label>
                    <input type="text" id="cliente" name="cliente" placeholder="Tu nombre" required>
                </div>

                <div class="form-group">
                    <label for="direccion">Dirección *</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle, número, apto" required>
                </div>

                <div class="form-group">
                    <label for="celular">Número de Celular *</label>
                    <input type="tel" id="celular" name="celular" placeholder="Ej: 3108941971" required>
                </div>

                <div class="botones">
                    <button type="submit" class="btn-continuar">✓ Continuar a Pago</button>
                </div>
            </div>
        </form>

        <div style="text-align: center; margin-top: 20px;">
            <a href="/" class="btn-volver">← Seguir comprando</a>
        </div>
    </div>
</div>

<script>
    // Calcular total dinámicamente (opcional si quieres validación)
    function actualizarTotal() {
        const items = document.querySelectorAll('tbody tr');
        let total = 0;
        items.forEach(item => {
            const subtotal = parseFloat(
                item.querySelector('td:nth-child(4)').textContent
                    .replace('$', '').replace(',', '')
            );
            total += subtotal;
        });
        return total;
    }
</script>

</body>
</html>
